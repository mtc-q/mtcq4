<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mtcq</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 fill=%22%230a0a0a%22/><text x=%2216%22 y=%2223%22 font-size=%2218%22 font-family=%22monospace%22 fill=%22white%22 text-anchor=%22middle%22>m</text></svg>">
<link rel="stylesheet" href="style.css">
<style>
  body { transition: background .3s, color .3s; }
  .tree-wrap { max-width: 560px; margin: 0 auto; padding: 56px 22px 80px; }
  .avatar-name { text-align: center; margin-bottom: 8px; }
  .avatar-name h1 { font-family: var(--font-display); font-size: clamp(28px, 6vw, 44px); line-height: 1.05; }
  .handle { text-align: center; font-family: var(--font-mono); font-size: 12px; opacity: .6; letter-spacing: .12em; }
  .bio { text-align: center; margin: 14px auto 34px; max-width: 42ch; opacity: .85; font-size: 14px; }

  .tree-links .branch a {
    display: flex; align-items: center; gap: 14px;
    border: 1px solid currentColor;
    padding: 14px 16px;
    text-decoration: none;
    color: inherit;
    background: transparent;
    transition: transform .1s ease;
  }
  .tree-links .branch a:hover { transform: translateX(5px); }
  .tree-links .trunkline::before, .tree-links .branch::before { background: currentColor; opacity: .35; }
  .tree-links img { width: 44px; height: 44px; object-fit: cover; border: 1px solid currentColor; flex: none; }
  .tree-links .t { font-family: var(--font-mono); font-size: 14px; font-weight: 700; }
  .tree-links .d { font-size: 12px; opacity: .65; margin-top: 2px; }
  .tree-links .arrow { margin-left: auto; font-family: var(--font-mono); opacity: .5; }

  .empty, .missing { text-align: center; font-family: var(--font-mono); font-size: 13px; opacity: .7; padding: 40px 0; }
  .missing h1 { font-family: var(--font-display); font-size: 40px; opacity: 1; margin-bottom: 10px; }

  .made-with { text-align: center; margin-top: 56px; }
  .made-with a {
    color: inherit; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: .18em; text-transform: uppercase; text-decoration: none;
    border: 1px solid currentColor; padding: 8px 14px; display: inline-block;
  }
</style>
</head>
<body>

<div class="overlay" id="maintenance-overlay">
  <div><h1>mtcq is paused</h1><p>The platform is temporarily shut down for maintenance. Check back soon.</p></div>
</div>

<main class="tree-wrap" id="page">
  <p class="empty">Loading…</p>
</main>

<script type="module">
import {
  auth, db, onAuthStateChanged, doc, getDoc, setDoc, increment,
  getPlatformConfig, enforceMaintenance, esc, WALLPAPERS, displayUrl
} from "./app.js";

const page = document.getElementById("page");

// username from ?u=name, or from the path when served with hosting rewrites (mtcq.org/name)
function resolveUsername() {
  const q = new URLSearchParams(location.search).get("u");
  if (q) return q.toLowerCase();
  const seg = location.pathname.split("/").filter(Boolean).pop() || "";
  if (seg && !seg.includes(".")) return seg.toLowerCase();
  return null;
}

function applyWallpaper(wp) {
  const preset = WALLPAPERS[wp?.preset] || WALLPAPERS.ink;
  if (wp?.preset === "custom" && wp.custom) {
    document.body.style.background = wp.custom;
    document.body.style.color = pickText(wp.custom);
  } else {
    document.body.style.background = preset.css;
    document.body.style.color = preset.text;
  }
}
function pickText(hex) {
  const n = parseInt(hex.slice(1), 16);
  const lum = 0.299 * (n >> 16 & 255) + 0.587 * (n >> 8 & 255) + 0.114 * (n & 255);
  return lum > 140 ? "#0a0a0a" : "#ffffff";
}

function notFound(name) {
  document.title = "Not found — mtcq";
  page.innerHTML = `<div class="missing">
    <h1>404</h1>
    <p>There's no tree at <b>/${esc(name || "")}</b> — but the name might be free.</p>
    <div class="made-with"><a href="index.html">Claim it on mtcq</a></div>
  </div>`;
}

async function main() {
  const config = await getPlatformConfig();
  // maintenance: wait for auth so the admin can still preview pages
  const user = await new Promise(res => { const off = onAuthStateChanged(auth, u => { off(); res(u); }); });
  if (enforceMaintenance(config, user)) return;

  const name = resolveUsername();
  if (!name) return notFound("");

  const snap = await getDoc(doc(db, "trees", name));
  if (!snap.exists()) return notFound(name);
  const tree = snap.data();

  document.title = `${tree.displayName || name} — mtcq`;
  applyWallpaper(tree.wallpaper);

  const links = tree.links || [];
  page.innerHTML = `
    <div class="avatar-name"><h1>${esc(tree.displayName || name)}</h1></div>
    <div class="handle">${esc(displayUrl(name))}</div>
    ${tree.bio ? `<p class="bio">${esc(tree.bio)}</p>` : '<div style="height:26px"></div>'}
    <div class="tree-links">
      ${links.length ? `<div class="trunkline">` + links.map(l => `
        <div class="branch">
          <a href="${esc(l.url)}" data-id="${esc(l.id)}" target="_blank" rel="noopener noreferrer">
            ${l.img ? `<img src="${l.img}" alt="">` : ""}
            <span><span class="t">${esc(l.title)}</span>${l.desc ? `<span class="d">${esc(l.desc)}</span>` : ""}</span>
            <span class="arrow">→</span>
          </a>
        </div>`).join("") + `</div>`
      : `<p class="empty">No links here yet.</p>`}
    </div>
    <div class="made-with"><a href="index.html">Make your own tree — free</a></div>`;

  // ---- stats: one view per browser session, clicks fire-and-forget ----
  const statsRef = doc(db, "stats", name);
  const viewKey = `mtcq-viewed-${name}`;
  if (!sessionStorage.getItem(viewKey)) {
    sessionStorage.setItem(viewKey, "1");
    setDoc(statsRef, { views: increment(1) }, { merge: true }).catch(() => {});
  }
  page.querySelectorAll("a[data-id]").forEach(a => {
    a.addEventListener("click", () => {
      setDoc(statsRef, { clicks: { [a.dataset.id]: increment(1) } }, { merge: true }).catch(() => {});
    });
  });
}

main().catch(() => notFound(resolveUsername()));
</script>
</body>
</html>
